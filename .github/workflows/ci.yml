name: run-tests
on: push
permissions: {}
jobs:
  yarn-ubuntu:
    name: yarn-ubuntu
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2
      with:
        persist-credentials: false
    - name: Run yarn
      run: |
        yarn && yarn compile && yarn test
  yarn-windows:
    name: yarn-windows
    runs-on: windows-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2
      with:
        persist-credentials: false
    - name: Run yarn
      run: |
        yarn && yarn compile && yarn test
